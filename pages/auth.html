<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Administração - Biblioteca</title>
    <link rel="icon" type="image/png" href="../assets/favicon.png">
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <main class="container">
        <h1>Área Administrativa</h1>

        <div id="loadingStatus" style="text-align: center; margin: 20px 0;">
            <p>Verificando integridade do sistema...</p>
        </div>

        <form id="formLogin" style="display: none;">
            <p>Entre com suas credenciais de bibliotecário.</p>
            <div class="campo">
                <label for="emailLogin">E-mail</label>
                <input type="email" id="emailLogin" required placeholder="exemplo@dominio.com">
            </div>
            <div class="campo">
                <label for="senhaLogin">Senha</label>
                <input type="password" id="senhaLogin" required placeholder="***********">
            </div>
            <button type="submit">Entrar no Painel</button>
        </form>

        <form id="formRegistro" style="display: none;">
            <p>Crie a conta do administrador mestre.</p>
            <div class="campo">
                <label for="nomeRegistro">Nome Completo</label>
                <input type="text" id="nomeRegistro" required>
            </div>
            <div class="campo">
                <label for="emailRegistro">E-mail</label>
                <input type="email" id="emailRegistro" required>
            </div>
            <div class="campo">
                <label for="senhaRegistro">Senha</label>
                <input type="password" id="senhaRegistro" required>
            </div>
            <div class="campo">
                <label for="senhaRegistroConfirm">Confirmar Senha</label>
                <input type="password" id="senhaRegistroConfirm" required>
            </div>
            <button type="submit" style="background-color: #0056b3;">Inicializar Sistema</button>
        </form>

        <div class="link-admin">
            <a href="../index.html">← Voltar ao Agendamento</a>
        </div>
    </main>
    <script src="../js/utils/ui.js"></script>
    <script src="../js/auth/auth.js"></script>
</body>

</html>
