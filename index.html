<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendamento de Serviços - Biblioteca</title>
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>

    <main class="container">
        <h1>Agendamento - Serviço de Referência</h1>
        <p>Preencha os dados abaixo para reservar seu horário na biblioteca da Etec.</p>

        <form id="formAgendamento" novalidate>

            <div class="campo" id="bloco-rm">
                <label for="rm">RM do Aluno (5 dígitos):</label>
                <input type="text" id="rm" name="rm" required inputmode="numeric" pattern="[0-9]{5}" maxlength="5"
                    placeholder="Ex: 12345">

            </div>

            <div class="campo">
                <label for="name">Nome Completo:</label>
                <input type="text" id="nome" name="nome" required placeholder="Seu nome completo">
            </div>

            <div class="campo" id="bloco-email">
                <label for="email">E-mail Institucional:</label>
                <input type="email" id="email" name="email" required pattern=".+@etec\.sp\.gov\.br"
                    placeholder="rm@etec.sp.gov.br">
            </div>

            <div class="campo">
                <label for="curso">Curso Técnico:</label>
                <input type="text" id="curso" name="curso" required placeholder="Ex: Técnico em Informática">
            </div>

            <div class="campo-servicos">
                <p>Serviço Desejado (Selecione um ou ambos):</p>
                <label>
                    <input type="checkbox" name="servico" value="Levantamento Bibliográfico">
                    Levantamento Bibliográfico
                </label>
                <br>
                <label>
                    <input type="checkbox" name="servico" value="Normalização ABNT">
                    Normalização ABNT
                </label>
            </div>

            <div class="campo" id="bloco-data">
                <label for="data">Data do Atendimento:</label>
                <div class="input-container-clicavel">
                    <input type="date" id="data" name="data" required>
                </div>
            </div>

            <div class="campo">
                <label for="horario">Horário do Atendimento:</label>
                <select id="horario" name="horario" required disabled>
                    <option value="" disabled selected>Selecione uma data primeiro...</option>
                </select>
            </div>

            <button type="submit">Solicitar Agendamento</button>
        </form>
        <div class="link-admin">
            <a href="./pages/auth.html">🔒 Acesso Restrito - Bibliotecário</a>
        </div>
    </main>

    <script src="./js/utils/ui.js"></script>
    <script src="./js/script.js"></script>

    </main>
    <footer class="rodape-biblioteca">
        <p>
            Dúvidas sobre o agendamento? Entre em contato:
            <a href="mailto:ricardo.osawa@etec.sp.gov.br">ricardo.osawa@etec.sp.gov.br</a>
        </p>
    </footer>
</body>

</html>
